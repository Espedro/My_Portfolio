<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">BelieverHub product preview</title>
  <desc id="desc">A fellowship platform preview with groups, prayer, feed, and a verse card.</desc>
  <rect width="1200" height="675" fill="#f6f7f8"/>
  <rect x="82" y="58" width="1036" height="559" rx="30" fill="#1f3349"/>
  <rect x="122" y="106" width="300" height="462" rx="24" fill="#ffffff"/>
  <text x="164" y="166" fill="#1f3349" font-family="Georgia, serif" font-size="34" font-weight="700">BelieverHub</text>
  <text x="164" y="200" fill="#64748b" font-family="Inter, Arial" font-size="17">Fellowship, not content</text>
  <rect x="164" y="258" width="216" height="72" rx="18" fill="#1f3349"/>
  <text x="190" y="289" fill="#ffffff" font-family="Inter, Arial" font-size="18" font-weight="900">Prayer Center</text>
  <text x="190" y="315" fill="#cbd5e1" font-family="Inter, Arial" font-size="14">28 people praying</text>
  <rect x="164" y="350" width="216" height="72" rx="18" fill="#edf2f7"/>
  <text x="190" y="381" fill="#1f3349" font-family="Inter, Arial" font-size="18" font-weight="900">Groups</text>
  <text x="190" y="407" fill="#64748b" font-family="Inter, Arial" font-size="14">Church-led circles</text>
  <rect x="462" y="106" width="614" height="462" rx="24" fill="#ffffff"/>
  <rect x="510" y="154" width="518" height="152" rx="24" fill="#1f3349"/>
  <rect x="540" y="190" width="6" height="78" rx="3" fill="#facc15"/>
  <text x="572" y="214" fill="#ffffff" font-family="Georgia, serif" font-size="32" font-style="italic">You are not walking alone.</text>
  <text x="572" y="256" fill="#cbd5e1" font-family="Inter, Arial" font-size="17">A signature verse moment for a sacred but modern identity.</text>
  <rect x="510" y="342" width="238" height="144" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="540" y="384" fill="#1f3349" font-family="Inter, Arial" font-size="22" font-weight="900">Small groups</text>
  <text x="540" y="416" fill="#64748b" font-family="Inter, Arial" font-size="16">Density starts one church at a time.</text>
  <rect x="790" y="342" width="238" height="144" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="820" y="384" fill="#9a3412" font-family="Inter, Arial" font-size="22" font-weight="900">I'm praying</text>
  <text x="820" y="416" fill="#9a3412" font-family="Inter, Arial" font-size="16">Visible support with counters and faces.</text>
  <circle cx="834" cy="454" r="16" fill="#1f3349"/>
  <circle cx="868" cy="454" r="16" fill="#5f7f95"/>
  <circle cx="902" cy="454" r="16" fill="#facc15"/>
</svg>
